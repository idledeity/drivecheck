# config.yaml — drivecheck configuration

auth:
  username: admin
  password_hash: ""  # bcrypt hash — generate with scripts/hash_password.py (TODO)

collector:
  scan_interval: 300  # seconds — drive discovery (scan + reconciliation)
  keep_history_days: 90  # days — retention window for time-series tables (drive_signals,
                          # drive_heartbeats, drive_vitals, drive_raw_snapshots)
  max_workers: 4      # thread pool size for per-drive channel polling
  probe_timeout: 30   # seconds — subprocess timeout for smartctl calls
  poll_intervals:
    telemetry: 300    # seconds — signals + heartbeat
    snapshot: 14400   # seconds — raw smartctl JSON persistence
    vitals: 10        # seconds — cheap temp + disk IO activity
    traits: 86400     # seconds — re-run traits probes for already-known drives

  # Probe chains, run in order. Each stage's results are merged/concatenated —
  # see Probe System in CLAUDE.md.
  scan_probes:
    - probes.scan.smartctl_scan
  traits_probes:
    - probes.traits.smartctl_traits
  telemetry_probes:
    - probes.telemetry.smartctl_telemetry
  vitals_probes:
    - probes.vitals.hwmon_temp
    - probes.vitals.smartctl_vitals
    - probes.vitals.sysfs_io

data:
  dir: ./data

server:
  host: 127.0.0.1
  port: 4343
  debug: false
