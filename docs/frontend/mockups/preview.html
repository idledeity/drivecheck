<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Card Mockup</title>

<style>
:root{
    --bg:#0f1115;
    --panel:#181a1f;
    --panel2:#20242b;

    --text:#e7e7e7;
    --muted:#8b929e;

    --green:#22c55e;
    --blue:#4ea1ff;
    --yellow:#fbbf24;
    --red:#ef4444;

    --border:#303641;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        sans-serif;
    padding:24px;
}

.drive-grid{
    display:grid;
    gap:12px;
}

.drive{
    background:linear-gradient(
        180deg,
        rgba(36,39,46,.95),
        rgba(25,27,31,.95)
    );

    border:1px solid var(--border);
    border-radius:14px;

    padding:14px 18px;

    position:relative;

    box-shadow:
        inset 0 1px rgba(255,255,255,.03),
        0 6px 18px rgba(0,0,0,.25);
}

.drive::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:3px;
    border-radius:14px 0 0 14px;
    background:var(--green);
}

.top-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.title-group{
    min-width:0;
}

.drive-title{
    display:flex;
    align-items:center;
    gap:8px;

    font-size:22px;
    font-weight:600;
}

.health-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--green);

    box-shadow:0 0 10px var(--green);
}

.pool{
    color:var(--muted);
    font-weight:400;
}

.health{
    color:#62ff98;
    font-size:28px;
    font-weight:700;
    text-align:right;
}

.health small{
    display:block;
    font-size:13px;
    color:var(--muted);
    font-weight:500;
}

.meta{
    margin-top:10px;

    display:flex;
    gap:16px;
    flex-wrap:wrap;

    color:var(--muted);
    font-size:14px;
}

.meta span{
    display:flex;
    align-items:center;
    gap:6px;
}

.task-area{
    margin-top:16px;
    padding-left:12px;

    border-left:2px solid var(--blue);
}

.task-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:8px;
}

.task-name{
    color:#c8d6ff;
    font-size:18px;
}

.queue{
    color:var(--muted);
    font-size:14px;
}

.progress-wrap{
    display:flex;
    align-items:center;
    gap:12px;
}

.progress{
    flex:1;
    height:8px;
    background:#101215;
    border-radius:999px;
    overflow:hidden;
}

.progress-fill{
    width:62%;
    height:100%;
    background:linear-gradient(
        90deg,
        #3d8dff,
        #67b1ff
    );
}

.percent{
    font-weight:700;
    color:#69d0ff;
}

.task-detail{
    margin-top:8px;
    color:var(--muted);
    font-size:14px;
}

.footer{
    margin-top:14px;
    padding-top:12px;

    border-top:1px solid rgba(255,255,255,.05);

    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;

    color:var(--muted);
    font-size:13px;
}

.smart{
    display:flex;
    gap:12px;
}

.smart strong{
    color:#d8d8d8;
    font-weight:600;
}

.io{
    display:flex;
    gap:18px;
}

.read{
    color:#7dd3fc;
}

.write{
    color:#fca5a5;
}

/* warning example */
.warning::before{
    background:var(--yellow);
}

.warning .health{
    color:var(--yellow);
}

/* critical example */
.critical::before{
    background:var(--red);
}

.critical .health{
    color:var(--red);
}

@media (max-width:700px){

    .drive-title{
        font-size:18px;
    }

    .health{
        font-size:20px;
    }

    .task-name{
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="drive-grid">

    <div class="drive">

        <div class="top-row">

            <div class="title-group">

                <div class="drive-title">
                    <div class="health-dot"></div>
                    WD Red Plus 4TB
                    <span class="pool">(NAS Pool #3)</span>
                </div>

                <div class="meta">
                    <span>💽 HDD</span>
                    <span>🗄 4 TB</span>
                    <span>🌡 34°C</span>
                    <span>/dev/sda</span>
                    <span><strong>SN:</strong> WD-WX21D94HK3L2</span>
                </div>

            </div>

            <div class="health">
                94%
                <small>Healthy</small>
            </div>

        </div>

        <div class="task-area">

            <div class="task-header">
                <div class="task-name">
                    Extended SMART Test
                </div>

                <div class="queue">
                    1 queued
                </div>
            </div>

            <div class="progress-wrap">

                <div class="progress">
                    <div class="progress-fill"></div>
                </div>

                <div class="percent">
                    62%
                </div>

            </div>

            <div class="task-detail">
                Running extended • Pass 1/1 • ~47 min remaining
            </div>

        </div>

        <div class="footer">

            <div class="smart">
                <span><strong>14,302h</strong></span>
                <span>0 realloc</span>
                <span>0 pending</span>
                <span>0 read err</span>
                <span>2 spinups</span>
            </div>

            <div class="io">
                <span class="read">↑ 12.4 MB/s</span>
                <span class="write">↓ 0 MB/s</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
